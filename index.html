<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Speech Commands TFJS</title>
</head>
<body>
    <h1>Reconocimiento de Voz con TF.js</h1>
    <p>Palabras que entiende: <em>up, down, left, right, yes, no, go, stop...</em></p>
    
    <button id="start-btn">Iniciar Escucha</button>
    <button id="stop-btn" disabled>Detener</button>

    <h2 id="status">Estado: Modelo no inicializado</h2>
    <div id="result" style="font-size: 24px; font-weight: bold; color: blue; margin-top: 20px;"></div>

    <script src="app.js"></script>
</body>
</html>
