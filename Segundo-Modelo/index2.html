<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wav2Vec 2.0 - Transformer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        /* Reseteo y fondo general */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            color: #39ff14;
        }
        
        .retro-container {
            border: 4px solid #39ff14;
            padding: 40px;
            background: #0a0a0a;
            box-shadow: 0 0 20px #39ff14, inset 0 0 20px #39ff14;
            text-align: center;
            max-width: 800px;
            width: 90%;
            text-transform: uppercase;
        }
        
        .retro-title {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            line-height: 1.5;
        }
        
        .retro-subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }
        
        .retro-screen {
            background-color: #021002;
            border: 4px solid #39ff14;
            padding: 30px 20px;
            margin: 20px 0 40px 0;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            line-height: 1.5;
            text-shadow: 0 0 5px currentColor;
        }

        .retro-confidence {
            font-size: 0.7rem;
            color: #0ff;
            margin-top: 15px;
            text-shadow: none;
        }
        
        .retro-btn {
            background-color: transparent;
            color: #39ff14;
            border: 4px solid #39ff14;
            padding: 15px 25px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            margin: 10px;
            transition: all 0.2s ease;
        }
        
        .retro-btn:hover:not(:disabled) {
            background-color: #39ff14;
            color: #000;
            box-shadow: 0 0 15px #39ff14;
        }
        
        .retro-btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
            text-shadow: none;
        }
        
        .retro-footer {
            margin-top: 40px;
            font-size: 0.6rem;
            color: #777;
            line-height: 2;
        }
    </style>
</head>
<body>

    <div class="retro-container">
        <div class="retro-title">MATERIA: SEMINARIO DE ACTUALIZACION</div>
        <div class="retro-subtitle">MODELO: WAV2VEC 2.0 (TRANSFORMER)</div>

        <div class="retro-screen" id="screen">
            <span id="command">ESPERANDO MICROFONO...</span>
            <span id="confidence" class="retro-confidence"></span>
        </div>

        <button id="recordBtn" class="retro-btn" disabled>[ INICIAR SISTEMA ]</button>
        
        <div class="retro-footer">
            * HABLAR DE FORMA NATURAL EN INGLES.<br/>
            * CAPTURA DE AUDIO LIMITADA A 1.2 SEGUNDOS.<br/>
            (C) 2026 TSDSM
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/predict_json";
        const recordBtn = document.getElementById('recordBtn');
        const commandDisplay = document.getElementById('command');
        const confidenceDisplay = document.getElementById('confidence');
        const screenDiv = document.getElementById('screen');

        let audioContext;
        let mediaStream;
        let audioBuffer = [];
        const TARGET_SAMPLE_RATE = 16000;

        async function setupAudio() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                commandDisplay.innerText = "SISTEMA EN LINEA. LISTO.";
                recordBtn.innerText = "[ GRABAR COMANDO ]";
                recordBtn.disabled = false;
            } catch (err) {
                commandDisplay.innerText = "ERROR: MICROFONO DENEGADO";
                commandDisplay.style.color = "#ff007f";
                recordBtn.disabled = true;
            }
        }

        async function iniciarGrabacion() {
            audioBuffer = [];
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: TARGET_SAMPLE_RATE });
            
            const source = audioContext.createMediaStreamSource(mediaStream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (e) => {
                const canalInput = e.inputBuffer.getChannelData(0);
                audioBuffer.push(...canalInput);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);

            recordBtn.disabled = true;
            recordBtn.style.color = "#ff007f";
            recordBtn.style.borderColor = "#ff007f";
            recordBtn.innerText = "[ ESCUCHANDO... ]";
            commandDisplay.innerText = "PROCESANDO AUDIO CRUDO...";
            commandDisplay.style.color = "#39ff14";
            confidenceDisplay.innerText = "";
            screenDiv.style.borderColor = "#ff007f";

            // Graba exactamente 1.2 segundos para enviar a Python
            setTimeout(async () => {
                source.disconnect();
                processor.disconnect();
                audioContext.close();

                recordBtn.style.color = "#39ff14";
                recordBtn.style.borderColor = "#39ff14";
                recordBtn.innerText = "[ ENVIANDO A SERVIDOR... ]";
                
                await enviarMatrizNumérica(audioBuffer);
            }, 1200);
        }

        async function enviarMatrizNumérica(floatArray) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "samples": floatArray })
                });

                if (!response.ok) throw new Error("Error en servidor Python");

                const data = await response.json();
                if (data.success) {
                    commandDisplay.innerText = ` COMANDO: ${data.command.toUpperCase()}`;
                    commandDisplay.style.color = "#fff";
                    confidenceDisplay.innerText = `PRECISION: ${data.confidence}%`;
                    screenDiv.style.borderColor = "#39ff14";
                }
            } catch (error) {
                console.error(error);
                commandDisplay.innerText = "ERROR DE CONEXION BACKEND";
                commandDisplay.style.color = "#ff007f";
                screenDiv.style.borderColor = "#ff007f";
            } finally {
                recordBtn.disabled = false;
                recordBtn.innerText = "[ GRABAR COMANDO ]";
            }
        }

        recordBtn.addEventListener('click', iniciarGrabacion);
        
        // Pedimos permisos de micrófono ni bien carga la página retro
        setupAudio();
    </script>
</body>
</html>
